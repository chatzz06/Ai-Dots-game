<!DOCTYPE html>
<html>
  <head>
    <title>Connect Four</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="title">Connect Four</h1>
    <p class="instructions">Click a column to drop your disc. Get 4 in a row to win.</p>

    <div class="players">
      <span class="player red">You</span>
      <span class="player yellow">Computer</span>
    </div>

    <p id="status" aria-live="polite">Your turn</p>

    <div id="board" class="board" role="grid" aria-label="Connect Four board"></div>

    <button id="resetBtn" type="button">Restart Game</button>

    <script src="script.js"></script>
  </body>
</html>
